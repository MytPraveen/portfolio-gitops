apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio-staging

spec:
  replicas: 1
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      imagePullSecrets:
        - name: nexus-secret

      terminationGracePeriodSeconds: 30

      containers:
        - name: portfolio
          image: registry.praveeninfra.online/docker-private/devops-portfolio:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 10
