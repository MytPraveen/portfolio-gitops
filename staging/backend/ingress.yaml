apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-backend-ingress
  namespace: portfolio-staging
spec:
  ingressClassName: cilium
  rules:
  - host: api.praveeninfra.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio-backend-service
            port:
              number: 8000
