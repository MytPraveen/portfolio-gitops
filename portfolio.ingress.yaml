apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    argocd.argoproj.io/tracking-id: portfolio:networking.k8s.io/Ingress:portfolio/portfolio-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: praveeninfra.online
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: portfolio-backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio-service
            port:
              number: 80
